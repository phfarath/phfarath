# .github/workflows/readme.yml
# Place this in YOUR_USERNAME/YOUR_USERNAME repo (the profile repo)

name: Update README

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:

jobs:

  # --- Snake contribution animation ---
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Blog post auto-update ---
  blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Replace with your RSS feed URL (Medium, Substack, Dev.to, etc.)
          feed_list: "https://medium.com/feed/@pedropontesfarath"
          # Number of posts to show
          max_post_count: 5
          # Disable date display if you want cleaner look
          disable_sort: false
